<!DOCTYPE html>
<html>
<head>
    <title>To-Do List Web App</title>
    <link rel="stylesheet" href="style5.css">
</head>

<body>

<h1>To-Do List Web App</h1>

<div class="container">

    <!-- Form Section -->
    <div class="form">
        <h3>Add Task</h3>
        <input id="title" placeholder="Task Title">
        <textarea id="desc" placeholder="Task Description"></textarea>
        <button class="add" onclick="addTask()">Add Task</button>
    </div>

    <!-- Tasks Section -->
    <div class="tasks">
        <div class="section" id="pendingSection" style="display:none;">
            <h3>Pending Tasks</h3>
            <div id="pending"></div>
        </div>

        <div class="section" id="completedSection" style="display:none;">
            <h3>Completed Tasks</h3>
            <div id="completed"></div>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
